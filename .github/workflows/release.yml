name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  changesets:
    name: changesets
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run Changesets action
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: changesets
    if: ${{ needs.changesets.outputs.has_changesets == 'false' }}
    permissions:
      contents: write

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Resolve release metadata
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="stego-extension-v${VERSION}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

          git fetch --force --tags
          if git show-ref --tags --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            echo "SHOULD_PUBLISH=false" >> "$GITHUB_ENV"
            echo "Tag ${RELEASE_TAG} already exists; skipping publish."
          else
            echo "SHOULD_PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Install deps
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npm ci

      - name: Test
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npm test

      - name: Package VSIX
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npm run package

      - name: Resolve VSIX path
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          VSIX_PATH="$(ls -1t *.vsix | head -n 1)"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX file found after packaging."
            exit 1
          fi
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"

      - name: Upload VSIX to GitHub Release
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          files: ${{ env.VSIX_PATH }}

      - name: Validate VS Marketplace token
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "Missing VSCE_PAT secret. Add it in repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Publish to VS Marketplace
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npx @vscode/vsce publish -p "${{ secrets.VSCE_PAT }}"
